name: health-check

# External watchdog — pings /health every 15 min from GitHub Actions runners
# so the VPS being offline still triggers an alert (unlike ops_alert.py,
# which only runs on the VPS itself).
#
# Requires repo secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID.
# Push this workflow with: `gh auth refresh -s workflow` then `git push`.

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /api/health
        id: ping
        run: |
          code=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            --max-time 10 https://predictor.nullshift.sh/api/health)
          body=$(cat /tmp/body.txt)
          echo "status=$code" >> "$GITHUB_OUTPUT"
          echo "body=$body" >> "$GITHUB_OUTPUT"
          if [ "$code" = "200" ]; then
            echo "✓ healthy"
          else
            echo "✗ unhealthy: $code · $body"
            exit 1
          fi

      - name: Notify Telegram on failure
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ steps.ping.outputs.status }}
          BODY:   ${{ steps.ping.outputs.body }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHAT" ]; then
            echo "TELEGRAM_BOT_TOKEN / CHAT_ID secrets not set; skipping notify"
            exit 0
          fi
          msg="🚨 *predictor.nullshift.sh down*%0Astatus: ${STATUS:-timeout}%0Abody: ${BODY:-empty}"
          curl -sS "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${msg}"
